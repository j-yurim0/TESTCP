        const SHEET_NAME = '시트1'; // 탭 이름
        const CLIENT_ID = '791608320864-ro52gqaonn7ppkoib6due2m48sfv9969.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyBoOVQF_WEEiIZqFIA89ET2Rvt95CUjzWk';
        const SPREADSHEET_ID = '1I0-XY4ZjhbjCBHEbZ36B8QSKb99CQk2aBHgBpBMGLWc';
        const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';

        // ==========================================

        // 글로벌 변수 (스코프 문제 해결)
        const SHEET_ROW_MAP = [
            { row: 5, w: 50, h: 50, t: '2.1', l: 6000 },
            { row: 7, w: 75, h: 75, t: '2.1', l: 6000 }, { row: 8, w: 75, h: 75, t: '2.1', l: 6600 }, { row: 9, w: 75, h: 75, t: '2.1', l: 7200 }, { row: 10, w: 75, h: 75, t: '2.1', l: 8000 },
            { row: 12, w: 100, h: 50, t: '2.1', l: 5000 }, { row: 13, w: 100, h: 50, t: '2.1', l: 6000 }, { row: 14, w: 100, h: 50, t: '2.1', l: 6600 }, { row: 15, w: 100, h: 50, t: '2.1', l: 7200 }, { row: 16, w: 100, h: 50, t: '2.1', l: 8200 },

            { row: 29, w: 100, h: 100, t: '3.0', l: 5000 }, { row: 30, w: 100, h: 100, t: '3.0', l: 6000 }, { row: 31, w: 100, h: 100, t: '3.0', l: 7200 }, { row: 32, w: 100, h: 100, t: '3.0', l: 8000 },
            { row: 34, w: 100, h: 100, t: '3.2', l: 6000 }, { row: 35, w: 100, h: 100, t: '3.2', l: 6200 }, { row: 36, w: 100, h: 100, t: '3.2', l: 7200 }, { row: 37, w: 100, h: 100, t: '3.2', l: 8000 }
        ];

        const STANDARD_STOCKS = {
            "default": [6000, 6600, 7200, 8000],
            "100x100": { "2.1": [6000, 6600, 7200, 8000], "2.3": [6000, 6600, 7200, 8000], "3.0": [6000, 6200, 7200, 8000], "3.2": [6000, 6200, 7200, 8000] },
            "75x75": { "2.1": [6000, 6600, 7200, 8000], "2.3": [6000, 6600, 7200, 8000], "3.0": [6000, 6200, 7200, 8000], "3.2": [6000, 6200, 7200, 8000] },
            "100x50": { "2.1": [6000, 6600, 7200, 8200], "2.3": [6000, 6600, 7200, 8200], "3.0": [6000, 6600, 7200, 8200], "3.2": [6000, 6600, 7200, 8200] },
            "50x50": { "2.1": [6000], "2.3": [6000], "3.0": [6000], "3.2": [6000] }
        };

        const UNIT_WEIGHT_DATA = {
            "100-100-3.2": 9.52, "100-100-3.0": 8.96, "100-100-2.3": 6.95, "100-100-2.1": 6.37,
            "100-50-2.1": 4.72, "75-75-2.1": 4.72, "50-50-2.1": 3.07
        };

        const getUnitWeight = (w, h, t) => {
            const dims = [parseInt(w), parseInt(h)].sort((a, b) => b - a);
            const key = `${dims[0]}-${dims[1]}-${t}`;
            return UNIT_WEIGHT_DATA[key] || 0;
        };

        // 안전한 데이터 파싱
        const parseItemsFromGrid = (gridData, colMapping, defaultSpec, defaultThickness) => {
            if (!gridData || !colMapping) return [];
            const lenIdx = Object.keys(colMapping).find(k => colMapping[k] === 'length');
            const qtyIdx = Object.keys(colMapping).find(k => colMapping[k] === 'qty');
            if (lenIdx === undefined || qtyIdx === undefined) return [];
            
            const wIdx = Object.keys(colMapping).find(k => colMapping[k] === 'width');
            const hIdx = Object.keys(colMapping).find(k => colMapping[k] === 'height');
            const tIdx = Object.keys(colMapping).find(k => colMapping[k] === 'thickness');
            const markIdx = Object.keys(colMapping).find(k => colMapping[k] === 'marking');
            
            let items = [];
            let rowCounter = 0;
            
            gridData.forEach((row) => {
                if (!row) return;
                let rawLenStr = row[lenIdx] !== undefined ? String(row[lenIdx]) : '';
                let rawQtyStr = row[qtyIdx] !== undefined ? String(row[qtyIdx]) : '';
                
                let rawLen = rawLenStr.trim().replace(/,/g, '');
                let rawQty = rawQtyStr.trim().replace(/폰/g, '').replace(/,/g, '');
                if (!rawLen || !rawQty) return;
                
                let length = parseFloat(rawLen);
                const qty = parseInt(rawQty, 10);
                if (isNaN(length) || isNaN(qty) || qty <= 0) return;
                if (length < 20) length = Math.round(length * 1000); else length = Math.round(length);
                
                let w = wIdx !== undefined && row[wIdx] !== undefined ? String(row[wIdx]).trim().replace(/[^0-9.]/g, '') : '';
                let h = hIdx !== undefined && row[hIdx] !== undefined ? String(row[hIdx]).trim().replace(/[^0-9.]/g, '') : '';
                let t = tIdx !== undefined && row[tIdx] !== undefined ? String(row[tIdx]).trim().replace(/[^0-9.]/g, '') : '';
                let marking = markIdx !== undefined && row[markIdx] !== undefined ? String(row[markIdx]).trim() : '';
                
                if (!w) w = defaultSpec.split('*')[0] || '100';
                if (!h) h = defaultSpec.split('*')[1] || '100';
                if (!t) t = defaultThickness;
                
                const dims = [parseInt(w), parseInt(h)].sort((a, b) => b - a);
                const specKey = `${dims[0]}*${dims[1]} ${t}T`;
                items.push({ id: rowCounter++, length, qty, marking, specKey, w: dims[0], h: dims[1], t: t });
            });
            return items;
        };

        // --- Icons ---
        const IconWrapper = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Trash2 = (props) => <IconWrapper {...props}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><path d="M5 12h14" /><path d="M12 5v14" /></IconWrapper>;
        const Calculator = (props) => <IconWrapper {...props}><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></IconWrapper>;
        const FileSpreadsheet = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><path d="M8 13h2" /><path d="M8 17h2" /><path d="M14 13h2" /><path d="M14 17h2" /></IconWrapper>;
        const FileDown = (props) => <IconWrapper {...props}><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4" /><polyline points="14 2 14 8 20 8" /><path d="M2 15h10" /><path d="M9 18l3-3-3-3" /></IconWrapper>;
        const Building = (props) => <IconWrapper {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><path d="M9 22v-4h6v4" /><path d="M8 6h.01" /><path d="M16 6h.01" /><path d="M8 10h.01" /><path d="M16 10h.01" /><path d="M8 14h.01" /><path d="M16 14h.01" /><path d="M8 18h.01" /><path d="M16 18h.01" /></IconWrapper>;
        const Layers = (props) => <IconWrapper {...props}><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"></polyline></IconWrapper>;
        const Edit3 = (props) => <IconWrapper {...props}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></IconWrapper>;
        const EyeOff = (props) => <IconWrapper {...props}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></IconWrapper>;
        const Eye = (props) => <IconWrapper {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></IconWrapper>;
        const Copy = (props) => <IconWrapper {...props}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></IconWrapper>;
        const FilePdf = (props) => <IconWrapper {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><path d="M9 15h3a1.5 1.5 0 0 0 0-3H9v4" /><path d="M5 12v4" /><path d="M5 12h2" /><path d="M17 12h-3v4" /><path d="M17 14h-2" /></IconWrapper>;
        const Cloud = (props) => <IconWrapper {...props}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></IconWrapper>;

        // --- Modals ---
        const ModeSelector = ({ dongs, selectedModes, onModeChange }) => (
            <div className="max-h-60 overflow-y-auto border rounded p-2 bg-gray-50">
                <table className="w-full text-xs">
                    <thead><tr><th className="text-left p-1">동 이름</th><th className="text-left p-1">버전 선택</th></tr></thead>

                        {dongs.map(dong => (

                                        <option value="manual_result">수동 결과</option>
                                    </select>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const CopyResultModal = ({ isOpen, onClose, dongs, onConfirm }) => {
            if (!isOpen) return null;
            const [selectedDongs, setSelectedDongs] = useState(dongs.reduce((acc, d) => ({...acc, [d]: true}), {}));
            const toggleDong = (d) => setSelectedDongs(prev => ({...prev, [d]: !prev[d]}));
            const toggleAll = () => { 
                const allSelected = Object.values(selectedDongs).every(v => v); 
                const newState = {}; 
                dongs.forEach(d => newState[d] = !allSelected); 
                setSelectedDongs(newState); 
            };
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-80 modal-fade-in relative">

                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><Copy className="text-blue-600" /> 복사할 동 선택</h3>
                        <div className="space-y-2 mb-6 max-h-60 overflow-y-auto custom-scrollbar">
                            <div className="flex items-center gap-2 p-2 bg-gray-100 rounded font-bold cursor-pointer" onClick={toggleAll}>
                                <input type="checkbox" checked={Object.values(selectedDongs).every(v => v)} readOnly /> 전체 선택
                            </div>
                            {dongs.map(dong => (
                                <div key={dong} className="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer" onClick={() => toggleDong(dong)}>

            const [targetType, setTargetType] = useState('current'); 
            const [selectedModes, setSelectedModes] = useState(dongs.reduce((acc, d) => ({ ...acc, [d]: 'min_rows' }), {}));

            const handleConfirm = () => {

                                    <button onClick={() => setTargetType('all')} className={`p-3 rounded-lg border text-sm font-bold transition ${targetType === 'all' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 hover:bg-gray-50'}`}>전체 동</button>

                                    </select>
                                ) : (
                                    <ModeSelector dongs={dongs} selectedModes={selectedModes} onModeChange={(d, m) => setSelectedModes(p => ({ ...p, [d]: m }))} />
                                )}

                        </div>

                    </div>
                </div>
            );
        };

        const StockDeductModal = ({ isOpen, onClose, onConfirm, dongs, isLoggedIn, handleLogin }) => {
            if (!isOpen) return null;
            const [targetType, setTargetType] = useState('current'); 
            const [selectedModes, setSelectedModes] = useState(dongs.reduce((acc, d) => ({ ...acc, [d]: 'min_rows' }), {})); 
            const [singleMode, setSingleMode] = useState('min_rows');
            
            const handleConfirm = () => { 
                if (targetType === 'current') onConfirm('current', { mode: singleMode });

            };
            
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-96 modal-fade-in relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><X size={20} /></button>
                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><Cloud className="text-red-500" /> 재고 차감 (구글 시트)</h3>
                        {!isLoggedIn ? (
                            <div className="text-center py-6">
                                <p className="text-sm text-gray-500 mb-4">로그인이 필요합니다.</p>
                                <button onClick={handleLogin} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">구글 로그인</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">차감 대상</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setTargetType('current')} className={`p-3 rounded-lg border text-sm font-bold transition ${targetType === 'current' ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 hover:bg-gray-50'}`}>현재 동만</button>
                                        <button onClick={() => setTargetType('all')} className={`p-3 rounded-lg border text-sm font-bold transition ${targetType === 'all' ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 hover:bg-gray-50'}`}>전체 동</button>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">차감 버전 설정</label>
                                    {targetType === 'current' ? (
                                        <select className="w-full p-3 border rounded-lg bg-gray-50 font-bold" value={singleMode} onChange={(e) => setSingleMode(e.target.value)}>
                                            <option value="min_rows">① 작업 편의</option>
                                            <option value="min_loss">② LOSS 최소화</option>
                                            <option value="manual_result">③ 수동 결과</option>
                                        </select>
                                    ) : (
                                        <ModeSelector dongs={dongs} selectedModes={selectedModes} onModeChange={(d, m) => setSelectedModes(p => ({ ...p, [d]: m }))} />
                                    )}
                                </div>
                                <button onClick={handleConfirm} className="w-full mt-8 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition">차감 실행</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Sidebar = memo(({ viewMode, setViewMode, projectInfo, setProjectInfo, isNoDongMode, setIsNoDongMode }) => {
            const handleTextChange = useCallback((e, f) => setProjectInfo(p => ({ ...p, [f]: e.target.value })), [setProjectInfo]);
            const handleCheckChange = useCallback((e, f) => setProjectInfo(p => ({ ...p, [f]: e.target.checked })), [setProjectInfo]);
            
            return (
                <div id="sidebar" className="w-64 bg-white border-r border-gray-200 h-screen flex flex-col fixed left-0 top-0 z-30 print:hidden shadow-sm">
                    <div className="p-6 border-b">
                        <h1 className="text-xl font-bold flex items-center gap-2 text-blue-700"><Calculator /> Smart CP</h1>
                        <p className="text-xs text-gray-400 mt-1">Ver 12.1 (Stable)</p>
                    </div>
                    <div className="p-4 space-y-4 flex-1 overflow-y-auto">
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-gray-500">프로젝트 정보</label>
                            <input className="w-full p-2 border rounded text-sm bg-gray-50" placeholder="업체명" value={projectInfo.company} onChange={e => handleTextChange(e, 'company')} />
                            <input className="w-full p-2 border rounded text-sm bg-gray-50" placeholder="현장명" value={projectInfo.site} onChange={e => handleTextChange(e, 'site')} />
                            <input className="w-full p-2 border rounded text-sm bg-gray-50" placeholder="메모" value={projectInfo.note} onChange={e => handleTextChange(e, 'note')} />
                            <div className="flex flex-col gap-1 mt-2">
                                <label className="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" checked={projectInfo.isIronBanding} onChange={e => handleCheckChange(e, 'isIronBanding')} /> 철밴딩 동표기</label>
                                <label className="flex items-center gap-2 text-xs cursor-pointer font-bold text-blue-600"><input type="checkbox" checked={isNoDongMode} onChange={e => setIsNoDongMode(e.target.checked)} /> 동 표기 없음</label>
                            </div>
                        </div>
                        <div className="space-y-1">
                            <button onClick={() => setViewMode('input')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition ${viewMode === 'input' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><FileSpreadsheet size={16} /> 데이터 입력</button>
                            <button onClick={() => setViewMode('result')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition ${viewMode === 'result' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><Calculator size={16} /> CP 자동 결과</button>
                            <button onClick={() => setViewMode('manual')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition ${viewMode === 'manual' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}><Edit3 size={16} /> CP 직접 작성</button>
                        </div>
                    </div>
                </div>
            );
        });

        const DongTabs = ({ dongs, currentDong, setCurrentDong, addDong, deleteDong, renameDong }) => (
            <div className="flex gap-2 mb-4 overflow-x-auto pb-2 border-b items-center print:hidden">
                {dongs.map(dong => (
                    <div key={dong} className="relative group">
                        <button onDoubleClick={() => renameDong(dong)} onClick={() => setCurrentDong(dong)} className={`px-4 py-2 rounded-t-lg font-bold text-sm whitespace-nowrap transition pr-8 ${currentDong === dong ? 'bg-white border-x border-t border-gray-200 text-blue-600 relative top-[1px]' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                            <span className="flex items-center gap-2"><Building size={14} /> {dong}</span>
                        </button>
                        <div className={`absolute right-1 top-1/2 -translate-y-1/2 flex gap-1 ${currentDong === dong ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition`}>
                            <button onClick={(e) => { e.stopPropagation(); deleteDong(dong); }} className="p-0.5 text-gray-400 hover:text-red-500 rounded"><Trash2 size={10} /></button>
                        </div>
                    </div>
                ))}
                <button onClick={addDong} className="px-3 py-2 text-gray-400 hover:text-blue-600 font-bold text-sm bg-gray-50 rounded hover:bg-blue-50 transition"><Plus size={16} /></button>
            </div>
        );

        // --- Manual CP View (Excel Navigation Built-in) ---
        const ManualCPView = ({ dongs, currentDong, setCurrentDong, addDong, deleteDong, renameDong, projectInfo, manualData, setManualData, parsedItems, openCopyModal, isNoDongMode }) => {
            const rows = manualData[currentDong] || [];
            const [hideEmpty, setHideEmpty] = useState(false);
            
            const updateRows = (newRows) => { setManualData(prev => ({ ...prev, [currentDong]: newRows })); };
            const addStockRow = () => { const lastRow = rows.length > 0 ? rows[rows.length - 1] : { t: '2.1', w: '100', h: '100', l: 6000, qty: 1 }; const newRow = { id: Date.now(), t: lastRow.t, w: lastRow.w, h: lastRow.h, l: lastRow.l, qty: 1, cuts: Array(8).fill().map(() => ({ l: '', count: '', marking: '' })) }; updateRows([...rows, newRow]); };
            const handleStockChange = (rIdx, field, val) => { const newRows = [...rows]; newRows[rIdx] = { ...newRows[rIdx], [field]: val }; updateRows(newRows); };
            const handleCutChange = (rIdx, cIdx, field, val) => { const newRows = [...rows]; const newCuts = [...newRows[rIdx].cuts]; newCuts[cIdx] = { ...newCuts[cIdx], [field]: val }; newRows[rIdx] = { ...newRows[rIdx], cuts: newCuts }; updateRows(newRows); };
            const removeStockRow = (rIdx) => { if (confirm('삭제하시겠습니까?')) { const newRows = rows.filter((_, i) => i !== rIdx); updateRows(newRows); } };
            const removeAllRows = () => { if (confirm('모든 데이터를 삭제하시겠습니까?')) { updateRows([]); } };
            const sortRowsByLength = () => { const newRows = [...rows].sort((a, b) => { if (a.t !== b.t) return parseFloat(b.t) - parseFloat(a.t); if (a.w !== b.w) return parseFloat(b.w) - parseFloat(a.w); if (a.h !== b.h) return parseFloat(b.h) - parseFloat(a.h); return b.l - a.l; }); updateRows(newRows); };
            
            // 🚨 엑셀 스타일 방향키 이동 (완벽 수정본)
            const handleKeyDown = (e, rIdx, type, cIdx, field) => {
                const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                if (!keys.includes(e.key)) return;
                
                e.preventDefault(); // 스크롤 방지
                let targetId = null;

                // 좌우 이동 (같은 줄 유지)
                if (e.key === 'ArrowRight') {
                    if (type === 'stock') {
                        const fields = ['t','w','h','l','qty'];
                        const fIdx = fields.indexOf(field);
                        if (fIdx < 4) targetId = `s-${rIdx}-${fields[fIdx+1]}`;
                        else targetId = `c-${rIdx}-0-l`; // 수량 -> 첫번째 컷팅 길이
                    } else if (type === 'cut') {
                        const fields = ['l', 'count', 'marking'];
                        const fIdx = fields.indexOf(field);
                        if (fIdx < 2) targetId = `c-${rIdx}-${cIdx}-${fields[fIdx+1]}`; // 옆칸 이동
                        else if (cIdx < 7) targetId = `c-${rIdx}-${cIdx+1}-l`; // 마킹 -> 다음 컷팅 길이 (같은 그룹)
                    }
                } else if (e.key === 'ArrowLeft') {
                    if (type === 'stock') {
                        const fields = ['t','w','h','l','qty'];
                        const fIdx = fields.indexOf(field);
                        if (fIdx > 0) targetId = `s-${rIdx}-${fields[fIdx-1]}`;
                    } else if (type === 'cut') {
                        const fields = ['l', 'count', 'marking'];
                        const fIdx = fields.indexOf(field);
                        if (fIdx > 0) targetId = `c-${rIdx}-${cIdx}-${fields[fIdx-1]}`; // 왼쪽 칸 이동
                        else if (cIdx > 0) targetId = `c-${rIdx}-${cIdx-1}-marking`; // 이전 컷팅 마킹
                        else targetId = `s-${rIdx}-qty`; // 길이 -> 원본 수량
                    }
                } 
                // 상하 이동
                else if (e.key === 'ArrowDown') {
                    if (type === 'stock') {
                        const nextR = Math.min(rows.length - 1, rIdx + 1);
                        targetId = `s-${nextR}-${field}`;
                    } else if (type === 'cut') {
                        if (cIdx < 7) {
                            targetId = `c-${rIdx}-${cIdx+1}-${field}`; // 다음 컷팅 (아래)
                        } else {
                            const nextR = Math.min(rows.length - 1, rIdx + 1);
                            if(rIdx !== nextR) targetId = `c-${nextR}-0-${field}`; // 다음 그룹 첫 컷팅
                        }
                    }
                } else if (e.key === 'ArrowUp') {
                    if (type === 'stock') {
                        const prevR = Math.max(0, rIdx - 1);
                        targetId = `s-${prevR}-${field}`;
                    } else if (type === 'cut') {
                        if (cIdx > 0) {
                            targetId = `c-${rIdx}-${cIdx-1}-${field}`; // 이전 컷팅 (위)
                        } else {
                            const prevR = Math.max(0, rIdx - 1);
                            if(rIdx !== prevR) targetId = `c-${prevR}-7-${field}`; // 이전 그룹 마지막 컷팅
                        }
                    }
                }

                if (targetId) {
                    const el = document.getElementById(targetId);
                    if (el) el.focus();
                }
            };

            const requiredItems = useMemo(() => {
                const grouped = {};
                (parsedItems || []).forEach(item => {
                    const itemMarking = item.marking ? String(item.marking).trim() : '';
                    const key = `${item.t}|${item.w}|${item.h}|${item.length}|${itemMarking}`;
                    if (!grouped[key]) grouped[key] = { ...item, marking: itemMarking, required: 0, used: 0 };
                    grouped[key].required += item.qty;
                });
                return Object.values(grouped).sort((a, b) => b.length - a.length);
            }, [parsedItems]);

            const remainingItems = useMemo(() => {
                const statusMap = {};
                requiredItems.forEach(item => { 
                    const key = `${item.t}|${item.w}|${item.h}|${item.length}|${item.marking}`; 
                    statusMap[key] = { ...item, used: 0, isExtra: false }; 
                });
                
                (rows || []).forEach(row => {
                    if (Array.isArray(row.cuts)) {
                        row.cuts.forEach(cut => {
                            if (cut.l && cut.count) {
                                const cutLen = parseFloat(cut.l);
                                const totalCutCount = parseInt(cut.count) * parseInt(row.qty || 0);
                                const cutMarking = cut.marking ? String(cut.marking).trim() : '';
                                const key = `${row.t || ''}|${row.w || ''}|${row.h || ''}|${cutLen}|${cutMarking}`;
                                
                                if (statusMap[key]) { 
                                    statusMap[key].used += totalCutCount; 
                                } else { 
                                    statusMap[key] = { t: row.t, w: row.w, h: row.h, length: cutLen, marking: cutMarking, required: 0, used: totalCutCount, isExtra: true }; 
                                }
                            }
                        });
                    }
                });
                return Object.values(statusMap).sort((a, b) => { 
                    if(a.isExtra !== b.isExtra) return a.isExtra ? -1 : 1; 
                    return b.length - a.length; 
                });
            }, [requiredItems, rows]);

            return (
                <div className="animate-fade-in pb-20 flex gap-4 h-[calc(100vh-100px)]">
                    <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                        <div className="p-3 border-b bg-gray-50 flex justify-between items-center shrink-0">
                            <h2 className="font-bold flex items-center gap-2"><Edit3 size={18} className="text-blue-600" /> CP 직접 작성 {isNoDongMode ? '' : `(${currentDong})`}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setHideEmpty(!hideEmpty)} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center gap-1 border ${hideEmpty ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-300'}`}>{hideEmpty ? <EyeOff size={14} /> : <Eye size={14} />} 빈칸 숨기기</button>
                                <button onClick={sortRowsByLength} className="px-3 py-1.5 text-xs font-bold rounded bg-white border border-gray-300 text-gray-600 hover:bg-gray-50">길이 정렬</button>
                                <button onClick={removeAllRows} className="px-3 py-1.5 text-xs font-bold rounded bg-red-100 border border-red-200 text-red-600 hover:bg-red-200">전체 삭제</button>
                                <button onClick={openCopyModal} className="px-3 py-1.5 text-xs font-bold rounded bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-1"><Copy size={14} /> 수정(결과 복사)</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto custom-scrollbar bg-white p-4">
                            {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} addDong={addDong} deleteDong={deleteDong} renameDong={renameDong} />}
                            <table className="w-full border-collapse text-xs text-center shadow-sm">
                                <thead className="sticky top-0 z-10">
                                    <tr className="bg-cyan-100 h-8 border-y border-gray-300 text-gray-700 font-bold">
                                        <th className="border w-10">순번</th>
                                        <th className="border w-12">두께</th>
                                        <th className="border w-12">장변</th>
                                        <th className="border w-12">단변</th>
                                        <th className="border w-16">길이</th>
                                        <th className="border w-12">수량</th>
                                        <th className="border w-16 bg-blue-50">길이</th>
                                        <th className="border w-12 bg-blue-50">컷팅수</th>
                                        <th className="border w-12 bg-blue-50">수량</th>
                                        <th className="border bg-blue-50">마킹</th>
                                        <th className="border w-16">본당LOSS</th>
                                        <th className="border w-20">총LOSS</th>
                                        <th className="border w-12">비고</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(rows || []).map((row, rIdx) => {
                                        const cuts = Array.isArray(row.cuts) ? row.cuts : [];
                                        const visibleCuts = hideEmpty ? cuts.filter(c => c.l && c.count) : cuts;
                                        const renderCuts = visibleCuts.length > 0 ? visibleCuts : (hideEmpty ? [] : cuts);
                                        const rowSpan = Math.max(1, renderCuts.length);
                                        
                                        const stockLength = parseFloat(row.l) || 0;
                                        const usedLength = cuts.reduce((acc, c) => acc + ((parseFloat(c.l) || 0) * (parseFloat(c.count) || 0)), 0);
                                        const lossPerBar = stockLength - usedLength;
                                        
                                        return (
                                            <React.Fragment key={row.id || rIdx}>
                                                {renderCuts.map((cut, cIdx) => {
                                                    const isFirst = cIdx === 0;
                                                    const cutQty = (parseInt(cut.count) * parseInt(row.qty)) || '';
                                                    return (
                                                        <tr key={cIdx} className="border-b border-gray-200 hover:bg-gray-50 h-8">
                                                            {isFirst && (
                                                                <>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-100 font-bold relative group">
                                                                        {rIdx + 1}
                                                                        <button onClick={() => removeStockRow(rIdx)} className="absolute left-0 top-0 text-red-400 opacity-0 group-hover:opacity-100 p-0.5"><Trash2 size={10} /></button>
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-50 p-0">
                                                                        <input id={`s-${rIdx}-t`} className="input-cell bg-yellow-50" value={row.t || ''} onChange={e => handleStockChange(rIdx, 't', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'stock', 0, 't')} />
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-50 p-0">
                                                                        <input id={`s-${rIdx}-w`} className="input-cell bg-yellow-50" value={row.w || ''} onChange={e => handleStockChange(rIdx, 'w', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'stock', 0, 'w')} />
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-50 p-0">
                                                                        <input id={`s-${rIdx}-h`} className="input-cell bg-yellow-50" value={row.h || ''} onChange={e => handleStockChange(rIdx, 'h', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'stock', 0, 'h')} />
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-50 p-0">
                                                                        <input id={`s-${rIdx}-l`} type="number" className="input-cell bg-yellow-50 font-bold" value={row.l || ''} onChange={e => handleStockChange(rIdx, 'l', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'stock', 0, 'l')} />
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border bg-yellow-50 p-0">
                                                                        <input id={`s-${rIdx}-qty`} type="number" className="input-cell bg-yellow-50" value={row.qty || ''} onChange={e => handleStockChange(rIdx, 'qty', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'stock', 0, 'qty')} />
                                                                    </td>
                                                                </>
                                                            )}
                                                            <td className="border p-0">
                                                                <input id={`c-${rIdx}-${cIdx}-l`} type="number" className="input-cell focus:bg-blue-100" value={cut.l || ''} onChange={e => handleCutChange(rIdx, cIdx, 'l', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'cut', cIdx, 'l')} />
                                                            </td>
                                                            <td className="border p-0">
                                                                <input id={`c-${rIdx}-${cIdx}-count`} type="number" className="input-cell focus:bg-blue-100" value={cut.count || ''} onChange={e => handleCutChange(rIdx, cIdx, 'count', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'cut', cIdx, 'count')} />
                                                            </td>
                                                            <td className="border bg-gray-50 text-gray-500">
                                                                {cutQty ? cutQty.toLocaleString() : ''}
                                                            </td>
                                                            <td className="border p-0">
                                                                <input id={`c-${rIdx}-${cIdx}-marking`} className="input-cell text-left px-1 focus:bg-blue-100" value={cut.marking || ''} onChange={e => handleCutChange(rIdx, cIdx, 'marking', e.target.value)} onKeyDown={(e)=>handleKeyDown(e, rIdx, 'cut', cIdx, 'marking')} />
                                                            </td>
                                                            {isFirst && (
                                                                <>
                                                                    <td rowSpan={rowSpan} className={`border font-bold ${lossPerBar >= 650 ? 'text-blue-600' : (lossPerBar < 150 ? 'text-red-500' : 'text-gray-700')}`}>
                                                                        {isNaN(lossPerBar) ? '' : lossPerBar.toLocaleString()}
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border text-gray-600">
                                                                        {isNaN(lossPerBar) || !row.qty ? '' : (lossPerBar * row.qty).toLocaleString()}
                                                                    </td>
                                                                    <td rowSpan={rowSpan} className="border"></td>
                                                                </>
                                                            )}
                                                        </tr>
                                                    );
                                                })}
                                                <tr className="h-1 bg-gray-100 border-t border-gray-300"><td colSpan="13"></td></tr>
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                            <button onClick={addStockRow} className="w-full mt-4 py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-400 hover:border-blue-400 hover:text-blue-500 font-bold transition">+ 원본 추가</button>
                        </div>
                    </div>
                    <div className="w-80 flex flex-col gap-4">
                        <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden"><div className="p-2 bg-gray-800 text-white font-bold text-sm text-center">견적 물량 (필요 자재)</div><div className="flex-1 overflow-auto custom-scrollbar p-2"><table className="w-full text-xs text-center border-collapse"><thead className="sticky top-0 bg-white shadow-sm"><tr className="bg-gray-100 border-b"><th className="p-1">규격(T/W/H)</th><th className="p-1">길이</th><th className="p-1">수량</th><th className="p-1">마킹</th></tr></thead><tbody>{requiredItems.map((item, i) => (<tr key={i} className="border-b hover:bg-gray-50"><td className="p-1">{item.t}/{item.w}/{item.h}</td><td className="p-1 font-bold">{item.length}</td><td className="p-1">{item.required}</td><td className="p-1 text-left truncate max-w-[80px]" title={item.marking}>{item.marking}</td></tr>))}</tbody></table></div></div>
                        <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden"><div className="p-2 bg-blue-600 text-white font-bold text-sm text-center">남은 물량 (실시간)</div><div className="flex-1 overflow-auto custom-scrollbar p-2"><table className="w-full text-xs text-center border-collapse"><thead className="sticky top-0 bg-white shadow-sm"><tr className="bg-blue-50 border-b border-blue-200"><th className="p-1">규격(T/W/H)</th><th className="p-1">길이</th><th className="p-1">필요</th><th className="p-1">잔여</th><th className="p-1">마킹</th></tr></thead><tbody>{remainingItems.map((item, i) => { const remaining = item.required - item.used; const isDone = remaining <= 0; const isExtra = item.isExtra; return (<tr key={i} className={`border-b ${isExtra ? 'bg-orange-100 text-orange-800 font-bold' : (isDone ? 'bg-gray-100 text-gray-400' : 'hover:bg-blue-50')}`}><td className="p-1">{item.t}/{item.w}/{item.h}</td><td className="p-1 font-bold">{item.length}</td><td className="p-1">{item.required}</td><td className={`p-1 font-bold ${remaining < 0 ? 'text-red-500' : (remaining === 0 ? 'text-green-500' : 'text-black')}`}>{remaining}</td><td className="p-1 text-left truncate max-w-[60px]" title={item.marking}>{item.marking}</td></tr>); })}</tbody></table></div></div>
                    </div>
                </div>
            );
        };

        // --- Input View ---
        const InputView = ({ currentDong, dongs, setCurrentDong, addDong, deleteDong, renameDong, data, updateCurrentData, activeTab, setActiveTab, customStocks, setCustomStocks, processGridData, handlePaste, runAllDongs, isUserStockMode, setIsUserStockMode, userStockList, setUserStockList, setViewMode, isCalculating, isNoDongMode, handleFetchStock, isGapiReady, isLoggedIn, handleLogin, inputMode, setInputMode }) => {
            const [newStd, setNewStd] = useState({ w: '100', h: '100', t: '2.1', length: 6000, qty: 10 });
            const [newRem, setNewRem] = useState({ w: '100', h: '100', t: '2.1', length: 0, qty: 1 });
            
            const getSpecOptions = () => { const options = []; Object.keys(STANDARD_STOCKS).forEach(key => { if (Array.isArray(STANDARD_STOCKS[key])) { if (key !== "default") options.push({ label: key, value: key + "|2.1" }); } else { Object.keys(STANDARD_STOCKS[key]).forEach(subKey => { options.push({ label: `${key} ${subKey}T`, value: `${key}|${subKey}` }); }); } }); return options; };
            const getStandardLengthsForInput = (w, h, t) => { const dims = [parseInt(w), parseInt(h)].sort((a, b) => b - a); const specKey = `${dims[0]}x${dims[1]}`; const thickStr = String(t).trim(); const settings = STANDARD_STOCKS; if (settings[specKey]) { if (settings[specKey][thickStr]) return settings[specKey][thickStr]; if (thickStr === '2.3' && settings[specKey]['2.1']) return settings[specKey]['2.1']; if (settings[specKey]['all']) return settings[specKey]['all']; } return settings["default"] || []; };
            
            const handleCellChange = (rIdx, cIdx, val) => { const newData = [...data.gridData]; newData[rIdx][cIdx] = val; updateCurrentData({ gridData: newData }); };
            
            // 🚨 드롭다운 중복 방지 로직 (수정됨)
            const handleColMappingChange = (cIdx, val) => {
                const newMapping = { ...data.colMapping };
                if (val !== "") {
                    // 동일한 값이 다른 열에 있으면 그 열의 값을 지움
                    Object.keys(newMapping).forEach(k => {
                        if (newMapping[k] === val) newMapping[k] = "";
                    });
                }
                newMapping[cIdx] = val;
                updateCurrentData({ colMapping: newMapping });
            };

            const handleAddUserStock = (type) => { const stock = type === 'std' ? newStd : newRem; if (!stock.length || stock.length <= 0 || !stock.qty || stock.qty <= 0) { alert("길이와 수량을 올바르게 입력하세요."); return; } setUserStockList([...userStockList, { ...stock, id: Date.now(), type }]); };

            return (
                <div className="animate-fade-in pb-16 relative">
                    {isCalculating && (<div className="absolute inset-0 bg-white/80 z-50 flex flex-col items-center justify-center"><div className="loader mb-4"></div><p className="text-blue-600 font-bold animate-pulse mt-4">최적의 컷팅 패턴을 계산 중입니다...</p></div>)}
                    <div className="flex justify-between items-end mb-2">
                        <h2 className="text-lg font-bold text-gray-800">데이터 입력 {isNoDongMode ? '' : `(${currentDong})`}</h2>
                        <div className="flex gap-2">
                            <button onClick={runAllDongs} className="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-gray-900 flex gap-2 items-center transition"><Layers size={16} /> 전체 동 계산</button>
                            <button onClick={processGridData} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-700 flex gap-2 items-center transition"><Calculator size={16} /> 현재 동 계산</button>
                            <button onClick={() => setViewMode('manual')} className="bg-white border border-blue-600 text-blue-600 px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-50 flex gap-2 items-center transition"><Edit3 size={16} /> CP 직접 작성</button>
                        </div>
                    </div>
                    {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} addDong={addDong} deleteDong={deleteDong} renameDong={renameDong} />}

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 space-y-4">
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2 text-sm"><Settings size={16} /> 입력 양식 선택 (전체 적용)</h3>
                                <div className="flex bg-gray-100 p-1 rounded-lg">
                                    <button onClick={() => setInputMode('sales')} className={`flex-1 py-2 text-xs font-bold rounded ${inputMode === 'sales' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>영업 (기본)</button>
                                    <button onClick={() => setInputMode('design')} className={`flex-1 py-2 text-xs font-bold rounded ${inputMode === 'design' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>설계 (상세)</button>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-2 flex items-center gap-2 text-sm"><Cloud size={16} /> 구글 시트 재고 연동</h3>
                                {isGapiReady ? (!isLoggedIn ? (<button onClick={handleLogin} className="w-full bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-200 transition mb-2">구글 로그인 (재고 연동)</button>) : (<div className="space-y-2"><div className="text-xs text-green-600 font-bold mb-1">✓ 구글 계정 연동됨</div><button onClick={handleFetchStock} className="w-full bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow hover:bg-green-700 transition">📥 재고 불러오기 (사용)</button></div>)) : (<div className="text-xs text-gray-500">Google API 초기화 중...</div>)}
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-bold text-gray-700 mb-2 flex items-center gap-2 text-sm"><Settings size={16} /> 자재 설정</h3>
                                <div className="mb-3 border-b pb-3"><label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" className="w-4 h-4 text-blue-600" checked={isUserStockMode} onChange={e => setIsUserStockMode(e.target.checked)} /><span className="text-sm font-bold text-gray-800">제한된 자재로만 계산 (Inventory)</span></label><p className="text-[10px] text-gray-400 mt-1 pl-6">체크 시, 아래 리스트에 있는 자재로만 CP를 짭니다.</p></div>
                                {isUserStockMode ? (
                                    <div className="space-y-3">
                                        <div className="bg-blue-50 p-2 rounded border border-blue-100"><div className="text-xs font-bold text-blue-700 mb-1">표준 자재 추가</div><div className="flex gap-1 mb-1"><select className="flex-1 p-1 border rounded text-xs" value={`${newStd.w}*${newStd.h}|${newStd.t}`} onChange={e => { const val = e.target.value; if (!val) return; const [dim, t] = val.split('|'); const parts = dim.replace('x', '*').split('*'); setNewStd({ ...newStd, w: parts[0], h: parts[1], t: t, length: getStandardLengthsForInput(parts[0], parts[1], t)[0] }); }}>{getSpecOptions().map(opt => <option key={opt.value} value={opt.value.replace('x', '*')}>{opt.label}</option>)}</select><select className="w-20 p-1 border rounded text-xs" value={newStd.length} onChange={e => setNewStd({ ...newStd, length: +e.target.value })}>{getStandardLengthsForInput(newStd.w, newStd.h, newStd.t).map(l => <option key={l} value={l}>{l}</option>)}</select></div><div className="flex gap-1"><input type="number" className="flex-1 p-1 border rounded text-xs" placeholder="수량" value={newStd.qty} onChange={e => setNewStd({ ...newStd, qty: +e.target.value })} /><button onClick={() => handleAddUserStock('std')} className="px-2 bg-blue-600 text-white rounded text-xs font-bold">+</button></div></div>
                                        <div className="bg-gray-50 p-2 rounded border border-gray-200"><div className="text-xs font-bold text-gray-700 mb-1">잔재/기타 자재 추가</div><div className="flex gap-1 mb-1"><select className="w-full p-1 border rounded text-xs" value={`${newRem.w}*${newRem.h}|${newRem.t}`} onChange={e => { const val = e.target.value; if (!val) return; const [dim, t] = val.split('|'); const parts = dim.replace('x', '*').split('*'); setNewRem({ ...newRem, w: parts[0], h: parts[1], t: t }); }}>{getSpecOptions().map(opt => <option key={opt.value} value={opt.value.replace('x', '*')}>{opt.label}</option>)}</select></div><div className="flex gap-1"><input type="number" className="flex-1 p-1 border rounded text-xs" placeholder="길이" value={newRem.length || ''} onChange={e => setNewRem({ ...newRem, length: +e.target.value })} /><input type="number" className="w-12 p-1 border rounded text-xs" placeholder="수량" value={newRem.qty} onChange={e => setNewRem({ ...newRem, qty: +e.target.value })} /><button onClick={() => handleAddUserStock('rem')} className="px-2 bg-gray-600 text-white rounded text-xs font-bold">+</button></div></div>
                                        <div className="max-h-40 overflow-y-auto border-t pt-2 space-y-1">{userStockList.length === 0 && <p className="text-xs text-gray-400 text-center">추가된 자재가 없습니다.</p>}{userStockList.map(item => (<div key={item.id} className="flex justify-between items-center text-xs bg-white p-1 rounded border"><span>{item.type === 'std' ? '🟦' : '⬜'} {item.w}*{item.h} {item.t}T - <b>{item.length}</b> ({item.qty}본)</span><button onClick={() => setUserStockList(userStockList.filter(x => x.id !== item.id))} className="text-red-500"><Trash2 size={12} /></button></div>))}</div>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <div><label className="text-xs font-bold text-gray-500">기본 규격</label><div className="flex gap-2 mt-1"><select value={data.spec} onChange={e => updateCurrentData({ spec: e.target.value })} className="flex-1 p-1.5 border rounded text-sm bg-gray-50"><option>100*100</option><option>75*75</option><option>100*50</option><option>50*50</option></select><select value={data.thickness} onChange={e => updateCurrentData({ thickness: e.target.value })} className="w-20 p-1.5 border rounded text-sm bg-gray-50"><option>2.1</option><option>2.3</option><option>3.0</option><option>3.2</option></select></div></div>
                                        <div className="pt-2 border-t"><div className="flex bg-gray-100 p-1 rounded-lg mb-2"><button onClick={() => setActiveTab('standard')} className={`flex-1 py-1 text-xs font-bold rounded ${activeTab === 'standard' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>표준</button><button onClick={() => setActiveTab('custom')} className={`flex-1 py-1 text-xs font-bold rounded ${activeTab === 'custom' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>잔재(공통)</button></div>{activeTab === 'custom' && (<div className="space-y-2">{customStocks.map((s, i) => (<div key={i} className="flex flex-col gap-1 p-2 bg-gray-50 rounded border"><div className="flex gap-1 mb-1"><select className="w-full p-1 border rounded text-xs bg-white" value={`${s.w}*${s.h}|${s.t}`} onChange={e => { const val = e.target.value; if (val && val.includes('|')) { const [dim, t] = val.split('|'); const parts = dim.replace('x', '*').split('*'); const n = [...customStocks]; n[i].w = parts[0]; n[i].h = parts[1]; n[i].t = t; setCustomStocks(n); } }}><option value="">규격 선택</option>{getSpecOptions().map(opt => <option key={opt.value} value={opt.value.replace('x', '*')}>{opt.label}</option>)}</select></div><div className="flex gap-1 items-center"><input type="number" className="flex-1 p-1 border rounded text-xs" value={s.length} onChange={e => { const n = [...customStocks]; n[i].length = +e.target.value; setCustomStocks(n) }} placeholder="Length" /><input type="number" className="w-10 p-1 border rounded text-xs" value={s.qty} onChange={e => { const n = [...customStocks]; n[i].qty = +e.target.value; setCustomStocks(n) }} placeholder="Qty" /><button onClick={() => setCustomStocks(customStocks.filter((_, idx) => idx !== i))} className="text-red-400"><Trash2 size={14} /></button></div></div>))}<button onClick={() => setCustomStocks([...customStocks, { w: '100', h: '100', t: '2.1', length: 0, qty: 1 }])} className="w-full py-1 text-xs border border-dashed rounded text-blue-500 font-bold hover:bg-blue-50">+ 추가</button></div>)}</div>
                                    </div>
                                )}
                            </div>
                            <div className="p-3 bg-blue-50 rounded-lg text-xs text-blue-700">💡 <b>[작업 편의]</b> 모드는 잔재 150mm 이하(0 포함) 불가, 650mm 초과 기피, 마킹 뭉치기를 최우선으로 합니다.</div>
                        </div>
                        <div className="lg:col-span-3 bg-white p-0 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[700px] overflow-hidden">
                            <div className="p-3 border-b bg-gray-50 flex justify-between items-center"><span className="text-sm font-bold text-gray-600">엑셀 붙여넣기 영역 (수정 가능)</span><button onClick={() => { updateCurrentData({ rawInput: '', gridData: [] }) }} className="text-xs text-red-500 hover:underline">초기화</button></div>
                            <div className="flex-1 overflow-auto custom-scrollbar relative bg-white">
                                {data.gridData.length === 0 ? (
                                    <div className="absolute inset-0 flex items-center justify-center"><textarea className="absolute inset-0 opacity-0 cursor-text" onPaste={handlePaste} autoFocus /><div className="text-center text-gray-400 pointer-events-none"><p className="text-2xl font-bold mb-2">Ctrl + V</p><p className="text-sm">엑셀 표를 여기에 붙여넣으세요</p></div></div>
                                ) : (
                                    <table className="w-full text-xs border-collapse">
                                        <thead className="sticky top-0 bg-white shadow-sm z-10">
                                            <tr>
                                                <th className="p-1 border bg-gray-100 w-8 text-center text-gray-500">#</th>
                                                {data.gridData[0]?.map((_, cIdx) => (
                                                    <th key={cIdx} className="p-1 border min-w-[80px]">
                                                        <select className={`w-full p-1 border rounded text-xs font-bold ${['length', 'qty'].includes(data.colMapping[cIdx]) ? 'bg-blue-100 text-blue-700' : ['width', 'height', 'thickness'].includes(data.colMapping[cIdx]) ? 'bg-green-100 text-green-700' : 'bg-white text-gray-400'}`} value={data.colMapping[cIdx] || ''} onChange={e => handleColMappingChange(cIdx, e.target.value)}>
                                                            <option value="">- 무시 -</option><option value="width">가로</option><option value="height">세로</option><option value="thickness">두께</option><option value="length">📏 길이</option><option value="qty">🔢 수량</option><option value="marking">🏷️ 마킹</option>
                                                        </select>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white">
                                            {data.gridData.map((row, rIdx) => (
                                                <tr key={rIdx} className="hover:bg-blue-50">
                                                    <td className="p-1 border text-center text-gray-400 bg-gray-50">{rIdx + 1}</td>
                                                    {row.map((cell, cIdx) => (
                                                        <td key={cIdx} className="border p-0"><input className="w-full h-full p-1 text-xs border-none focus:ring-2 focus:ring-blue-500 outline-none" value={cell} onChange={(e) => handleCellChange(rIdx, cIdx, e.target.value)} /></td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Result View ---
        const ResultView = ({ currentDong, dongs, setCurrentDong, addDong, deleteDong, renameDong, resultsByDong, runAllDongs, openExcelModal, openStockModal, setViewMode, projectInfo, isNoDongMode, openCopyModal }) => {
            const [resultTab, setResultTab] = useState('min_rows');
            const allResults = resultsByDong && currentDong ? resultsByDong[currentDong] : null;
            useEffect(() => { if (allResults && allResults['manual_result'] && !allResults['min_rows']) setResultTab('manual_result'); }, [allResults]);
            const results = allResults ? allResults[resultTab] : null;
            const specKeys = results ? Object.keys(results).sort() : [];
            let overallSeq = 1;
            const handlePdfDownload = () => { window.print(); };

            return (
                <div id="main-content" className="animate-fade-in pb-20 print:w-full print:m-0">
                    <div className="flex justify-between items-center mb-4 print:hidden">
                        <h2 className="text-lg font-bold text-gray-800">CP 자동 결과 {isNoDongMode ? '' : `(${currentDong})`}</h2>
                        <div className="flex gap-2">
                            <button onClick={openCopyModal} className="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-600 transition flex items-center gap-2"><Copy size={16} /> 수정(결과 복사)</button>
                            <button onClick={runAllDongs} className="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-gray-900 transition flex items-center gap-2"><Layers size={16} /> 전체 동 계산</button>
                            <button onClick={openStockModal} className="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-red-600 transition flex items-center gap-2"><Cloud size={16} /> 재고 차감</button>
                            <button onClick={openExcelModal} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-green-700 flex items-center gap-2 transition"><FileDown size={16} /> 엑셀 저장</button>
                            <button onClick={handlePdfDownload} className="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-red-700 flex items-center gap-2 transition"><FilePdf size={16} /> PDF 저장</button>
                        </div>
                    </div>
                    <div className="print:block hidden mb-4"><h1 className="text-2xl font-bold">※ {projectInfo.company || '업체명'}({projectInfo.site || '현장명'}){isNoDongMode ? '' : ` - ${currentDong}`}</h1>{projectInfo.note && <p className="text-sm mt-1">비고: {projectInfo.note}</p>}</div>
                    {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} addDong={addDong} deleteDong={deleteDong} renameDong={renameDong} />}
                    {(!allResults || !results) ? (<div className="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400"><p>계산된 결과가 없습니다.</p></div>) : (
                        <div>
                            <div className="flex mb-4 border-b print:hidden gap-2">
                                <button onClick={() => setResultTab('min_rows')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'min_rows' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>① 작업 편의</button>
                                <button onClick={() => setResultTab('min_loss')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'min_loss' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-500 hover:text-gray-700'}`}>② LOSS 최소화</button>
                                {allResults['manual_result'] && <button onClick={() => setResultTab('manual_result')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'manual_result' ? 'border-b-2 border-purple-600 text-purple-600' : 'text-gray-500 hover:text-gray-700'}`}>③ 수동 계산 결과</button>}
                            </div>
                            <div className="space-y-8 bg-white p-8 rounded-xl shadow-sm border border-gray-200 min-h-screen print:border-none print:p-0">
                                {specKeys.map((specKey, idx) => {
                                    const { plan, summary } = results[specKey];
                                    let w="?", h="?", t="?"; try { const dims = specKey.split(' ')[0] || ""; const tPart = specKey.split(' ')[1] || ""; if (dims.includes('*')) [w, h] = dims.split('*'); else if (dims.includes('x')) [w, h] = dims.split('x'); else { w = dims; h = ""; } t = tPart.replace('T', ''); } catch (e) { }
                                    const displayLoss = Number(summary.totalLoss).toLocaleString();
                                    return (
                                        <div key={specKey || idx} className="break-before-page">
                                            <div className="flex items-center gap-3 mb-3 pb-2 border-b border-gray-100 print:border-none">
                                                <span className={`font-bold px-3 py-1 rounded text-sm print:hidden ${resultTab === 'min_rows' ? 'bg-blue-100 text-blue-700' : (resultTab === 'min_loss' ? 'bg-green-100 text-green-700' : 'bg-purple-100 text-purple-700')}`}>#{idx + 1} {resultTab === 'min_rows' ? '작업편의' : (resultTab === 'min_loss' ? 'LOSS최소' : '수동결과')}</span>
                                                <h3 className="font-bold text-xl text-gray-800">{specKey}</h3>
                                                <div className="text-xs text-gray-500 ml-auto flex gap-4 print:text-black"><span>총 원본: <b>{summary.totalBars}본</b></span><span>총 잔재: <b>{displayLoss}mm</b></span><span>잔재율: {summary.lossRate}%</span></div>
                                            </div>
                                            <table className="w-full border-collapse text-center text-xs">
                                                <thead><tr className="bg-gray-100 text-gray-700 h-8 border-y border-gray-300 print:bg-gray-200"><th className="border-x border-gray-200 w-10">순번</th><th className="border-x border-gray-200 w-12">두께</th><th className="border-x border-gray-200 w-12">장변</th><th className="border-x border-gray-200 w-12">단변</th><th className="border-x border-gray-200 w-16">원본길이</th><th className="border-x border-gray-200 w-12">수량</th><th className="border-x border-gray-200 w-16 bg-white font-bold text-blue-600 border-2 border-blue-100 print:border">컷팅길이</th><th className="border-x border-gray-200 w-12">컷팅수</th><th className="border-x border-gray-200 w-12">수량</th><th className="border-x border-gray-200">마킹</th><th className="border-x border-gray-200 w-16">본당LOSS</th><th className="border-x border-gray-200 w-20">총LOSS</th><th className="border-x border-gray-200 w-12">비고</th></tr></thead>
                                                <tbody>
                                                    {plan.map((group, gIdx) => {
                                                        const rowClass = 'bg-white';
                                                        return group.parts.map((part, pIdx) => (
                                                            <tr key={`${gIdx}-${pIdx}`} className={`${rowClass} border-b border-gray-200 hover:bg-gray-50 transition print:bg-transparent`}>
                                                                {pIdx === 0 && (<><td rowSpan={group.parts.length} className="border-x border-gray-200 font-bold bg-gray-50 print:bg-transparent">{overallSeq++}</td><td rowSpan={group.parts.length} className="border-x border-gray-200">{t}</td><td rowSpan={group.parts.length} className="border-x border-gray-200">{w}</td><td rowSpan={group.parts.length} className="border-x border-gray-200">{h}</td><td rowSpan={group.parts.length} className="border-x border-gray-200 font-bold">{group.stockLength}</td><td rowSpan={group.parts.length} className="border-x border-gray-200">{Math.floor(group.qty)}</td></>)}
                                                                <td className="border-x border-gray-200 font-bold text-gray-800">{part.length}</td><td className="border-x border-gray-200">{(part.totalQty / group.qty)}</td><td className="border-x border-gray-200 font-bold">{Math.floor(part.totalQty)}</td><td className="border-x border-gray-200 text-left px-2 truncate max-w-[150px]">{part.marking}</td>
                                                                {pIdx === 0 && (<><td rowSpan={group.parts.length} className={`border-x border-gray-200 font-bold ${group.remainder >= 650 ? 'bg-[#FFCCBC] text-red-600' : ''}`}>{Number(group.remainder).toLocaleString()}</td><td rowSpan={group.parts.length} className="border-x border-gray-200 text-gray-500">{(Number(group.remainder) * Number(group.qty)).toLocaleString(undefined, { maximumFractionDigits: 0 })}</td><td rowSpan={group.parts.length} className="border-x border-gray-200"></td></>)}
                                                            </tr>
                                                        ));
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Main Rendering ---
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
